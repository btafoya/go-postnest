services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postnest
      POSTGRES_PASSWORD: ${POSTNEST_DATABASE_PASSWORD:-changeme}
      POSTGRES_DB: postnest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postnest -d postnest"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      POSTNEST_SERVER_HTTP_ADDR: ":8080"
      POSTNEST_SERVER_IMAP_ADDR: ":143"
      POSTNEST_SERVER_SMTP_ADDR: ":587"
      POSTNEST_DATABASE_DSN: "postgres://postnest:${POSTNEST_DATABASE_PASSWORD:-changeme}@postgres:5432/postnest?sslmode=disable"
      POSTNEST_REDIS_URL: "redis://redis:6379/0"
      POSTNEST_SECURITY_SESSION_KEY: ${POSTNEST_SECURITY_SESSION_KEY}
      POSTNEST_POSTMARK_WEBHOOK_SECRET: ${POSTNEST_POSTMARK_WEBHOOK_SECRET:-}
      POSTNEST_TLS_CERT_PATH: ${POSTNEST_TLS_CERT_PATH:-}
      POSTNEST_TLS_KEY_PATH: ${POSTNEST_TLS_KEY_PATH:-}
      POSTNEST_SECURITY_ALLOW_INSECURE_AUTH: ${POSTNEST_SECURITY_ALLOW_INSECURE_AUTH:-true}
      POSTNEST_SECURITY_SECRET_KEY: ${POSTNEST_SECRET_KEY:-}
    ports:
      - "143:143"
      - "587:587"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ${POSTNEST_TLS_CERT_PATH:-/dev/null}:/etc/postnest/tls.crt:ro
      - ${POSTNEST_TLS_KEY_PATH:-/dev/null}:/etc/postnest/tls.key:ro
      - certs_data:/var/lib/postnest/certs

  webui:
    build:
      context: .
      dockerfile: Dockerfile.webui
    environment:
      WEBUI_ADDR: ":3000"
      WEBUI_API_BASE_URL: "http://server:8080"
      WEBUI_REDIS_URL: "redis://redis:6379/0"
    ports:
      - "${POSTNEST_WEBUI_PORT:-2626}:3000"
    depends_on:
      server:
        condition: service_started
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      POSTNEST_DATABASE_DSN: "postgres://postnest:${POSTNEST_DATABASE_PASSWORD:-changeme}@postgres:5432/postnest?sslmode=disable"
      POSTNEST_REDIS_URL: "redis://redis:6379/0"
      POSTNEST_SECURITY_SESSION_KEY: ${POSTNEST_SECURITY_SESSION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    environment:
      POSTNEST_DATABASE_DSN: "postgres://postnest:${POSTNEST_DATABASE_PASSWORD:-changeme}@postgres:5432/postnest?sslmode=disable"
      POSTNEST_SECURITY_SESSION_KEY: ${POSTNEST_SECURITY_SESSION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["up"]
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  certs_data:
